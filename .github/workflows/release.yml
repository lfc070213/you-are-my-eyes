name: Mobile Release
on:
  push:
    tags:
      - 'v*' 

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android 

      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm install

      # 🔐 1. 解码密钥
      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/uniflourish.keystore

      # 🔍 2. 【核心审计步】验证文件是否真的存在
      - name: Check Environment Paths
        run: |
          echo "--- 当前工作根目录: ${{ github.workspace }} ---"
          ls -la ${{ github.workspace }}/uniflourish.keystore
          if [ -f "${{ github.workspace }}/uniflourish.keystore" ]; then
            echo "✅ 确认：uniflourish.keystore 文件已成功还原且存在。"
          else
            echo "❌ 错误：文件未找到！"
            exit 1
          fi

      # 📦 3. 正式编译
      - name: Build Android
        run: npx tauri android build --apk
        env:
          # 使用绝对路径传递给环境变量
          TAURI_ANDROID_KEYSTORE: ${{ github.workspace }}/uniflourish.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Release App
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
            !src-tauri/gen/android/app/build/outputs/apk/**/release/*-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}